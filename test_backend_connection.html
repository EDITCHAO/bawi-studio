<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Backend Connection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #1e293b;
            margin-bottom: 1rem;
            font-size: 1.75rem;
        }
        
        .test-section {
            margin-bottom: 2rem;
        }
        
        .test-item {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border-left: 4px solid #e2e8f0;
            background: #f8f9fa;
        }
        
        .test-item.loading {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }
        
        .test-item.success {
            border-left-color: #10b981;
            background: #f0fdf4;
        }
        
        .test-item.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        
        .test-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .test-result {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        
        .icon {
            font-size: 1.25rem;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        
        .info {
            background: #dbeafe;
            border: 1px solid #93c5fd;
            color: #1e40af;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        
        .summary {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            text-align: center;
        }
        
        .summary.all-ok {
            background: #f0fdf4;
            border: 2px solid #10b981;
            color: #065f46;
        }
        
        .summary.has-errors {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Test de Connexion Backend</h1>
        
        <div class="info">
            <strong>ℹ️ Instructions:</strong><br>
            Cliquez sur "Démarrer les tests" pour vérifier que le backend fonctionne correctement.
        </div>
        
        <div class="test-section">
            <div class="test-item" id="test-backend">
                <div class="test-label">
                    <span class="icon">⏳</span>
                    <span>Backend (http://192.168.1.66:5000)</span>
                </div>
                <div class="test-result">En attente...</div>
            </div>
            
            <div class="test-item" id="test-health">
                <div class="test-label">
                    <span class="icon">⏳</span>
                    <span>Santé du serveur</span>
                </div>
                <div class="test-result">En attente...</div>
            </div>
            
            <div class="test-item" id="test-login">
                <div class="test-label">
                    <span class="icon">⏳</span>
                    <span>Connexion Admin</span>
                </div>
                <div class="test-result">En attente...</div>
            </div>
            
            <div class="test-item" id="test-stats">
                <div class="test-label">
                    <span class="icon">⏳</span>
                    <span>Statistiques</span>
                </div>
                <div class="test-result">En attente...</div>
            </div>
        </div>
        
        <button onclick="runTests()" id="test-btn">🚀 Démarrer les tests</button>
        
        <div id="summary"></div>
    </div>
    
    <script>
        const BACKEND_URL = 'http://192.168.1.66:5000';
        
        async function runTests() {
            const btn = document.getElementById('test-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Tests en cours...';
            
            const results = {
                backend: false,
                health: false,
                login: false,
                stats: false
            };
            
            // Test 1: Backend
            await testBackend(results);
            
            // Test 2: Health
            await testHealth(results);
            
            // Test 3: Login
            await testLogin(results);
            
            // Test 4: Stats
            await testStats(results);
            
            // Afficher le résumé
            showSummary(results);
            
            btn.disabled = false;
            btn.textContent = '🚀 Démarrer les tests';
        }
        
        async function testBackend(results) {
            const item = document.getElementById('test-backend');
            item.classList.add('loading');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/test`);
                if (response.ok) {
                    const data = await response.json();
                    item.classList.remove('loading');
                    item.classList.add('success');
                    item.querySelector('.test-result').textContent = `✅ ${data.message}`;
                    results.backend = true;
                } else {
                    throw new Error(`Status ${response.status}`);
                }
            } catch (error) {
                item.classList.remove('loading');
                item.classList.add('error');
                item.querySelector('.test-result').textContent = `❌ Erreur: ${error.message}`;
                results.backend = false;
            }
        }
        
        async function testHealth(results) {
            const item = document.getElementById('test-health');
            item.classList.add('loading');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/health`);
                if (response.ok) {
                    const data = await response.json();
                    item.classList.remove('loading');
                    item.classList.add('success');
                    item.querySelector('.test-result').textContent = `✅ Serveur en bonne santé (DB: ${data.database})`;
                    results.health = true;
                } else {
                    throw new Error(`Status ${response.status}`);
                }
            } catch (error) {
                item.classList.remove('loading');
                item.classList.add('error');
                item.querySelector('.test-result').textContent = `❌ Erreur: ${error.message}`;
                results.health = false;
            }
        }
        
        async function testLogin(results) {
            const item = document.getElementById('test-login');
            item.classList.add('loading');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'euloge',
                        password: '20-86'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    item.classList.remove('loading');
                    item.classList.add('success');
                    item.querySelector('.test-result').textContent = `✅ Connexion réussie (Token reçu)`;
                    results.login = true;
                } else {
                    throw new Error(`Status ${response.status}`);
                }
            } catch (error) {
                item.classList.remove('loading');
                item.classList.add('error');
                item.querySelector('.test-result').textContent = `❌ Erreur: ${error.message}`;
                results.login = false;
            }
        }
        
        async function testStats(results) {
            const item = document.getElementById('test-stats');
            item.classList.add('loading');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/stats`);
                if (response.ok) {
                    const data = await response.json();
                    item.classList.remove('loading');
                    item.classList.add('success');
                    item.querySelector('.test-result').textContent = `✅ Statistiques reçues (${data.client_messages.total} messages clients)`;
                    results.stats = true;
                } else {
                    throw new Error(`Status ${response.status}`);
                }
            } catch (error) {
                item.classList.remove('loading');
                item.classList.add('error');
                item.querySelector('.test-result').textContent = `❌ Erreur: ${error.message}`;
                results.stats = false;
            }
        }
        
        function showSummary(results) {
            const summary = document.getElementById('summary');
            const allOk = Object.values(results).every(v => v === true);
            
            if (allOk) {
                summary.innerHTML = `
                    <div class="summary all-ok">
                        <h2>✅ Tous les tests réussis!</h2>
                        <p>Le backend fonctionne correctement. Vous pouvez vous connecter au dashboard.</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">
                            Allez sur: <strong>http://192.168.1.66:5173/admin</strong>
                        </p>
                    </div>
                `;
            } else {
                const failed = Object.entries(results)
                    .filter(([_, v]) => !v)
                    .map(([k, _]) => k)
                    .join(', ');
                
                summary.innerHTML = `
                    <div class="summary has-errors">
                        <h2>❌ Certains tests ont échoué</h2>
                        <p>Tests échoués: ${failed}</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">
                            Vérifiez que:<br>
                            1. XAMPP est démarré (Apache + MySQL)<br>
                            2. Le backend est en cours d'exécution<br>
                            3. La base de données 'bawi_studio' existe
                        </p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
